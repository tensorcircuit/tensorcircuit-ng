title: "QUANTUM FINITE TEMPERATURE LANCZOS METHOD"
arxiv_id: "2603.25394"
url: "https://arxiv.org/abs/2603.25394"
year: 2026
authors: 
  - "Gian Gentinetta"
  - "Friederike Metz"
  - "William Kirby"
  - "Giuseppe Carleo"
tags:
  - "qftlm"
  - "quantum-krylov"
  - "finite-temperature"
  - "lanczos"
hardware_requirements:
  gpu: False
  min_memory: "2GB"
description: "Reproduces thermal expectation values of energy for the Transverse-Field Ising Model using the Quantum Finite Temperature Lanczos Method (QFTLM). The original system size L=14 is scaled to L=10 for computational feasibility while maintaining the core algorithm logic (Quantum Hutchinson states and generalized eigenvalue problem)."
outputs:
  - target: "Figure 1(a): Thermal expectation of Energy <E> vs Temperature T"
    path: outputs/result.png
    script: "main.py"
